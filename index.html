<!DOCTYPE html>
<html lang="vi">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="theme-color" content="#120212">
  <title>Love Rain</title>
  <link rel="stylesheet" href="./styles.css">
</head>
<body>
  <div class="background-orb orb-left"></div>
  <div class="background-orb orb-right"></div>

  <main class="memory-stage">
    <div class="stage-vignette"></div>
    <div class="stage-side-glow stage-side-glow-left"></div>
    <div class="stage-side-glow stage-side-glow-right"></div>

    <div class="heart-stream" id="heart-stream" aria-hidden="true"></div>
    <div class="love-rain-stage" id="love-rain-stage" aria-hidden="true"></div>

    <section class="photo-cloud" aria-label="Hình ảnh kỷ niệm">
      <figure class="memory-photo photo-a">
        <img src="./z7669297806671_b932a11288907142e6a3552625ffb71e.jpg" alt="Kỷ niệm 1">
      </figure>

      <figure class="memory-photo photo-b">
        <img src="./z7669297806870_707eaabb557ea39677aa191e057f1320.jpg" alt="Kỷ niệm 2">
      </figure>

      <figure class="memory-photo photo-c">
        <img src="./z7669297833762_e1b280f0682e6ffe5149d09a7b07fedc.jpg" alt="Kỷ niệm 3">
      </figure>

      <figure class="memory-photo photo-d">
        <img src="./z7669297833981_c3e9af711c4e22ac8b946ceb6b9a575d.jpg" alt="Khoảnh khắc 1">
      </figure>

      <figure class="memory-photo photo-e">
        <img src="./213df98b-1cf2-437f-af41-836289ca03cd.jpg" alt="Khoảnh khắc 2">
      </figure>

      <figure class="memory-video-card photo-f">
        <video autoplay muted loop playsinline preload="metadata">
          <source src="./7669297845653.mp4" type="video/mp4">
        </video>
      </figure>
    </section>
  </main>

  <script src="./script.js"></script>
</body>
</html>
