<!DOCTYPE html>
<html lang="vi">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="theme-color" content="#120212">
  <title>Love Rain</title>
  <link rel="stylesheet" href="./styles.css">
</head>
<body>
  <div class="background-orb orb-left"></div>
  <div class="background-orb orb-right"></div>

  <main class="memory-stage">
    <div class="stage-vignette"></div>
    <div class="stage-side-glow stage-side-glow-left"></div>
    <div class="stage-side-glow stage-side-glow-right"></div>

    <div class="heart-stream" id="heart-stream" aria-hidden="true"></div>
    <div class="love-rain-stage" id="love-rain-stage" aria-hidden="true"></div>

    <section class="photo-cloud" aria-label="Hình ảnh kỷ niệm">
      <figure class="memory-photo photo-a">
        <img src="./148713803_2841121106207611_5079910052233842401_n.jpg" alt="Kỷ niệm 1">
      </figure>

      <figure class="memory-photo photo-b">
        <img src="./213df98b-1cf2-437f-af41-836289ca03cd.jpg" alt="Kỷ niệm 2">
      </figure>

      <figure class="memory-photo photo-c">
        <img src="./68551717_2354084858244574_6545673559472078848_n.jpg" alt="Kỷ niệm 3">
      </figure>

      <figure class="memory-photo photo-d">
        <img src="./Screenshot%202025-12-28%20162411.png" alt="Khoảnh khắc 1">
      </figure>

      <figure class="memory-photo photo-e">
        <img src="./Screenshot%202025-12-28%20152443.png" alt="Khoảnh khắc 2">
      </figure>

      <figure class="memory-photo photo-f">
        <img src="./Screenshot%202025-12-28%20152949.png" alt="Khoảnh khắc 3">
      </figure>

      <figure class="memory-photo photo-g">
        <img src="./Screenshot%202025-12-28%20162238.png" alt="Khoảnh khắc 4">
      </figure>
    </section>
  </main>

  <script src="./script.js"></script>
</body>
</html>
